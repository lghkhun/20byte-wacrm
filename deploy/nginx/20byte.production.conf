server {
    server_name 20byte.com 20.lghkhun.com;

    client_max_body_size 64m;

    location / {
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        include /etc/nginx/snippets/20byte-active-upstream.conf;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/20byte.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/20byte.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = 20byte.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = 20.lghkhun.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name 20byte.com 20.lghkhun.com;
    return 404; # managed by Certbot
}
