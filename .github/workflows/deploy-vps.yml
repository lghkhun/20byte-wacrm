name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-vps-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      IMAGE_TAG: sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -eu
          : "${VPS_HOST:?Missing GitHub secret VPS_HOST}"
          : "${VPS_SSH_KEY:?Missing GitHub secret VPS_SSH_KEY}"
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          keyscan_ok=0
          for attempt in 1 2 3; do
            if ssh-keyscan -T 15 -H -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              keyscan_ok=1
              break
            fi
            echo "[deploy] ssh-keyscan gagal (attempt $attempt/3), retry..."
            sleep 3
          done
          if [ "$keyscan_ok" -ne 1 ]; then
            echo "[deploy] gagal ambil host key VPS. Cek VPS_HOST/VPS_PORT dan akses jaringan runner."
            exit 1
          fi

      - name: Deploy On VPS (resumable over SSH)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: /srv/20byte
          APP_IMAGE: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -eu
          : "${VPS_HOST:?Missing GitHub secret VPS_HOST}"
          : "${VPS_USER:?Missing GitHub secret VPS_USER}"
          : "${APP_IMAGE:?Missing APP_IMAGE}"

          SSH_OPTS="-p ${VPS_PORT:-22} -o ServerAliveInterval=20 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes -o ConnectTimeout=15"
          REMOTE="$VPS_USER@$VPS_HOST"
          DEPLOY_RUN_ID="${RUN_ID:-manual}-${RUN_ATTEMPT:-1}"
          PID_FILE="/tmp/20byte-deploy-${DEPLOY_RUN_ID}.pid"
          LOG_FILE="/tmp/20byte-deploy-${DEPLOY_RUN_ID}.log"

          # Jalankan deploy di background agar aman jika sesi SSH terputus.
          ssh $SSH_OPTS "$REMOTE" "
            set -eu
            cd '$VPS_PATH'
            chmod +x scripts/deploy.sh scripts/bootstrap-vps.sh scripts/docker-entrypoint.sh
            rm -f '$PID_FILE' '$LOG_FILE'
            nohup env \
              APP_IMAGE='$APP_IMAGE' \
              GHCR_USERNAME='$GHCR_USERNAME' \
              GHCR_TOKEN='$GHCR_TOKEN' \
              DEPLOY_GIT_AUTO_STASH=1 \
              sh -lc './scripts/deploy.sh' > '$LOG_FILE' 2>&1 &
            echo \$! > '$PID_FILE'
            echo '[deploy] started pid='\"\$(cat '$PID_FILE')\"' log=$LOG_FILE'
          "

          # Monitor deploy dengan reconnect loop.
          timeout_seconds=3600
          poll_interval=10
          started_at=$(date +%s)

          while true; do
            now=$(date +%s)
            elapsed=$((now - started_at))
            if [ "$elapsed" -ge "$timeout_seconds" ]; then
              echo "[deploy] timeout after ${timeout_seconds}s"
              ssh $SSH_OPTS "$REMOTE" "test -f '$LOG_FILE' && tail -n 120 '$LOG_FILE' || true" || true
              exit 1
            fi

            if ssh $SSH_OPTS "$REMOTE" "
              set -eu
              test -f '$PID_FILE'
              pid=\$(cat '$PID_FILE')
              if kill -0 \"\$pid\" 2>/dev/null; then
                test -f '$LOG_FILE' && tail -n 30 '$LOG_FILE' || true
                exit 10
              fi

              test -f '$LOG_FILE' && tail -n 120 '$LOG_FILE' || true
              # Jika process sudah mati, pakai marker dari log untuk sukses/gagal.
              if grep -Fq '[deploy] active production color is now' '$LOG_FILE'; then
                exit 0
              fi
              exit 1
            "; then
              echo "[deploy] finished successfully"
              break
            else
              rc=$?
              if [ "$rc" -eq 10 ]; then
                echo "[deploy] still running (${elapsed}s), continue monitoring..."
              else
                echo "[deploy] monitor ssh/check failed with code $rc, retrying..."
              fi
              sleep "$poll_interval"
            fi
          done
